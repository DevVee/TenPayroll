<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Deep-navy rounded background -->
  <rect width="100" height="100" rx="21" ry="21" fill="#1C3172"/>

  <!-- T — crossbar -->
  <rect x="9" y="14" width="38" height="13" rx="3.5" fill="white"/>
  <!-- T — stem -->
  <rect x="21" y="27" width="14" height="42" rx="3.5" fill="white"/>

  <!-- P — vertical stem (runs full height like T stem) -->
  <rect x="51" y="14" width="13" height="55" rx="3.5" fill="white"/>
  <!-- P — outer D loop -->
  <path d="M 64 14 C 92 14 92 53 64 53 Z" fill="white"/>
  <!-- P — inner cutout -->
  <path d="M 64 23 C 82 23 82 44 64 44 Z" fill="#1C3172"/>
</svg>
