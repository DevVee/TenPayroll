name: Kiosk Release

# Triggered when you push a tag like: git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-kiosk:
    name: Build & Package Kiosk Installer
    runs-on: windows-latest   # NSIS .exe must be built on Windows

    defaults:
      run:
        working-directory: kiosk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: kiosk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build & package
        env:
          SUPABASE_URL:      ${{ secrets.KIOSK_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.KIOSK_SUPABASE_ANON_KEY }}
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
        run: npm run pack

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: kiosk-installer
          path: kiosk/dist/*.exe
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TenPayroll Kiosk ${{ github.ref_name }}
          body: |
            ## TenPayroll Attendance Kiosk ${{ github.ref_name }}

            ### Installation
            1. Download `TenPayroll-Kiosk-Setup.exe` below
            2. Double-click → Next → Install → Finish
            3. The kiosk opens fullscreen automatically

            ### First-time setup
            - Ensure the kiosk device has internet access to sync employees from Supabase
            - Click **Refresh** on the idle screen to pull the employee list
            - After the first sync the kiosk works fully offline

            ### What's included
            - Offline-first SQLite queue — records check-ins even without internet
            - Auto-syncs to Supabase every 30 seconds when online
            - PIN and RFID card check-in
          files: kiosk/dist/*.exe
          draft: false
          prerelease: false
